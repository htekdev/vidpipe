name: Post-Push CI Gate
description: After pushing, watches GitHub PR check runs and fails if any CI job fails.
on:
  push:
    lifecycle: post
blocking: true
steps:
  - name: Wait for CI checks to complete
    timeout: 600
    run: |
      $branch = git rev-parse --abbrev-ref HEAD 2>$null
      if (-not $branch) {
        Write-Host "⚠️ Could not determine branch — skipping CI check"
        exit 0
      }
      
      $prJson = gh pr list --head $branch --json number --jq '.[0].number' 2>$null
      if (-not $prJson) {
        Write-Host "ℹ️ No open PR found for branch '$branch' — skipping CI check"
        exit 0
      }
      
      Write-Host "⏳ Watching CI checks for PR #$prJson on branch '$branch'..."
      gh pr checks $prJson --watch --fail-fast
      $exitCode = $LASTEXITCODE
      
      if ($exitCode -eq 0) {
        Write-Host "✅ All CI checks passed!"
      } elseif ($exitCode -eq 8) {
        Write-Host "⏳ Checks still pending (should not happen with --watch)"
      } else {
        Write-Host "❌ CI checks failed!"
      }
      
      exit $exitCode
